[[repos]]
repo = "local"

[[repos.hooks]]
id = "check-markdown"
name = "Check AGENTS.md == CLAUDE.md"
entry = "task --taskfile .ai/Taskfile.dist.yml check-markdown"
language = "system"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "cargo-fmt"
name = "Cargo fmt"
entry = "cargo fmt -- --check"
language = "system"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "cargo-clippy"
name = "Cargo clippy"
entry = "cargo clippy --workspace -- -D warnings"
language = "system"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "ts-typecheck"
name = "TypeScript typecheck"
entry = "bunx tsc --noEmit"
language = "system"
pass_filenames = false
stages = ["pre-push"]

[[repos.hooks]]
id = "check-tauri-versions"
name = "Tauri plugin version parity"
entry = "./script/check-tauri-versions"
language = "system"
pass_filenames = false
stages = ["pre-push"]
