name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust
    uses: ./.github/workflows/rust.yml

  ts:
    name: TypeScript
    uses: ./.github/workflows/ts.yml

  plugin-parity:
    name: Tauri Plugin Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Tauri plugin version parity
        run: ./script/check-tauri-versions
