version: "3"

tasks:
  generate:bindings:
    desc: "Generate TypeScript bindings from Rust types via ts-rs"
    sources:
      - crates/redpen-core/src/**/*.rs
      - src-tauri/src/**/*.rs
      - crates/redpen-core/Cargo.toml
      - src-tauri/Cargo.toml
    generates:
      - src/lib/bindings/*.ts
    cmds:
      - cargo test --workspace -- export_bindings

  check:bindings:
    desc: "Check that generated TypeScript bindings are up-to-date"
    cmds:
      - task: generate:bindings
      - git diff --exit-code src/lib/bindings/ || (echo "Bindings are stale. Run 'task generate:bindings' and commit." && exit 1)

  dev:
    desc: "Run Tauri in development mode"
    cmds:
      - bun run tauri dev

  dev:up:
    desc: "Install all dependencies (frontend + Rust)"
    cmds:
      - bun install
      - cargo check --workspace
      - task: generate:bindings

  dev:clean:
    desc: "Remove installed desktop app and CLI"
    cmds:
      - |
        APP="/Applications/Red Pen.app"
        if [ -d "$APP" ]; then
          rm -rf "$APP"
          echo "Removed $APP"
        else
          echo "No installed app found at $APP"
        fi
      - |
        CLI=$(which redpen 2>/dev/null || true)
        if [ -n "$CLI" ]; then
          cargo uninstall redpen-cli 2>/dev/null && echo "Uninstalled redpen CLI" || echo "CLI not installed via cargo"
        else
          echo "No redpen CLI found in PATH"
        fi

  dev:install:
    desc: "Build and install the desktop app and CLI locally"
    cmds:
      - task: macos:prepare-cli
      - bun run tauri build
      - |
        # Install desktop app
        APP="/Applications/Red Pen.app"
        if [ -d "$APP" ]; then
          echo "Removing existing $APP"
          rm -rf "$APP"
        fi
        cp -R target/release/bundle/macos/Red\ Pen.app /Applications/
        echo "Installed Red Pen.app to /Applications"

  macos:prepare-cli:
    desc: "Build redpen CLI and stage it for macOS bundling"
    cmds:
      - |
        set -euo pipefail
        if [ -n "${TAURI_TARGET:-}" ]; then
          cargo build --release -p redpen-cli --target "${TAURI_TARGET}"
          SOURCE="target/${TAURI_TARGET}/release/redpen"
        else
          cargo build --release -p redpen-cli
          SOURCE="target/release/redpen"
        fi
        mkdir -p src-tauri/binaries
        cp "${SOURCE}" src-tauri/binaries/redpen
        chmod +x src-tauri/binaries/redpen
        echo "Prepared bundled redpen from ${SOURCE}"

  macos:staple-dmg:
    desc: "Staple the latest signed macOS DMG"
    cmds:
      - |
        set -euo pipefail
        TARGET_ROOT="target"
        if [ -n "${TAURI_TARGET:-}" ]; then
          TARGET_ROOT="${TARGET_ROOT}/${TAURI_TARGET}"
        fi

        DMG_DIR="${TARGET_ROOT}/release/bundle/dmg"
        DMG="$(find "${DMG_DIR}" -maxdepth 1 -name 'Red Pen_*.dmg' | sort | tail -n 1)"

        if [ -n "${DMG}" ]; then
          xcrun stapler staple "${DMG}"
        fi

  macos:zip-app:
    desc: "Zip the latest signed macOS app bundle"
    cmds:
      - |
        set -euo pipefail
        TARGET_ROOT="target"
        if [ -n "${TAURI_TARGET:-}" ]; then
          TARGET_ROOT="${TARGET_ROOT}/${TAURI_TARGET}"
        fi

        VERSION=$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["version"])')
        APP="${TARGET_ROOT}/release/bundle/macos/Red Pen.app"
        APP_ZIP="${TARGET_ROOT}/release/bundle/macos/Red Pen_${VERSION}.app.zip"

        rm -f "${APP_ZIP}"
        ditto -c -k --sequesterRsrc --keepParent "${APP}" "${APP_ZIP}"
        echo "Prepared ${APP_ZIP}"

  macos:notarize-dmg:
    desc: "Notarize the latest signed macOS DMG"
    cmds:
      - |
        set -euo pipefail
        TARGET_ROOT="target"
        if [ -n "${TAURI_TARGET:-}" ]; then
          TARGET_ROOT="${TARGET_ROOT}/${TAURI_TARGET}"
        fi

        DMG_DIR="${TARGET_ROOT}/release/bundle/dmg"
        DMG="$(find "${DMG_DIR}" -maxdepth 1 -name 'Red Pen_*.dmg' | sort | tail -n 1)"

        if [ -z "${DMG}" ]; then
          echo "No DMG found to notarize"
          exit 0
        fi

        export DMG
        ./scripts/run-macos-signing.sh sh -c '
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          elif [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -n "${APPLE_API_KEY_PATH:-}" ]; then
            xcrun notarytool submit "$DMG" \
              --key "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --key-path "$APPLE_API_KEY_PATH" \
              --wait
          else
            echo "Missing notarization credentials for DMG submission" >&2
            exit 1
          fi
        '

  macos:verify:
    desc: "Verify the latest signed macOS artifacts"
    cmds:
      - |
        set -euo pipefail
        TARGET_ROOT="target"
        if [ -n "${TAURI_TARGET:-}" ]; then
          TARGET_ROOT="${TARGET_ROOT}/${TAURI_TARGET}"
        fi

        APP="${TARGET_ROOT}/release/bundle/macos/Red Pen.app"
        DMG_DIR="${TARGET_ROOT}/release/bundle/dmg"
        DMG="$(find "${DMG_DIR}" -maxdepth 1 -name 'Red Pen_*.dmg' | sort | tail -n 1)"

        codesign --verify --deep --strict --verbose=2 "${APP}"
        spctl --assess --type execute --verbose=4 "${APP}"

        if [ -n "${DMG}" ]; then
          xcrun stapler validate "${DMG}"
        fi

  sign:
    desc: "Build, sign, notarize, and staple the macOS app"
    cmds:
      - task: macos:prepare-cli
      - |
        set -euo pipefail
        ./scripts/run-macos-signing.sh bun run tauri build -- ${TAURI_BUILD_ARGS:-}
      - task: macos:notarize-dmg
      - task: macos:staple-dmg
      - task: macos:verify

  sign:op:
    desc: "Run the signing workflow with secrets loaded from 1Password"
    preconditions:
      - sh: "command -v op >/dev/null 2>&1"
        msg: "1Password CLI 'op' is required"
      - sh: '[ -f ".env.signing" ]'
        msg: ".env.signing is required"
    cmds:
      - |
        op run --env-file=.env.signing -- task sign

  build:signed:
    desc: "Alias for the macOS signing flow"
    cmds:
      - task: sign

  build:signed:op:
    desc: "Alias for the 1Password-backed macOS signing flow"
    cmds:
      - task: sign:op

  publish:
    desc: "Create or update the GitHub release for the current version and upload the signed app zip, DMG, and CLI tarball"
    preconditions:
      - sh: "command -v gh >/dev/null 2>&1"
        msg: "GitHub CLI 'gh' is required"
    cmds:
      - task: macos:zip-app
      - |
        set -euo pipefail
        TARGET_ROOT="target"
        if [ -n "${TAURI_TARGET:-}" ]; then
          TARGET_ROOT="${TARGET_ROOT}/${TAURI_TARGET}"
        fi

        VERSION=$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["version"])')
        TAG="v${VERSION}"
        APP_ZIP="${TARGET_ROOT}/release/bundle/macos/Red Pen_${VERSION}.app.zip"

        if ! gh release view "$TAG" &>/dev/null; then
          gh release create "$TAG" --title "$TAG" --notes ""
          echo "Created release $TAG"
        fi

        gh release upload "$TAG" "$APP_ZIP" --clobber
        echo "Uploaded $APP_ZIP to $TAG"

        find "${TARGET_ROOT}" -path "*/release/bundle/dmg/Red Pen_${VERSION}_*.dmg" -print | while read -r DMG; do
          gh release upload "$TAG" "$DMG" --clobber
          echo "Uploaded $DMG to $TAG"
        done

        cargo build --release -p redpen-cli
        TARBALL="redpen-${VERSION}-aarch64-apple-darwin.tar.gz"
        tar -czf "$TARBALL" -C target/release redpen
        gh release upload "$TAG" "$TARBALL" --clobber
        rm -f "$TARBALL"
        echo "Uploaded $TARBALL to $TAG"

  publish:op:
    desc: "Sign with 1Password-backed secrets, then publish the current version"
    cmds:
      - task: sign:op
      - task: publish

  changelog:
    desc: Generate changelog for the latest tag
    cmds:
      - git cliff --latest --strip header -o CHANGELOG.md
    preconditions:
      - sh: command -v git-cliff
        msg: "git-cliff not installed. Run: cargo install git-cliff"

  changelog:preview:
    desc: Preview changelog for unreleased changes
    cmds:
      - git cliff --unreleased --strip header

  changelog:full:
    desc: Generate full changelog from all tags
    cmds:
      - git cliff -o CHANGELOG.md


  release:brew:
    desc: "Update homebrew-tap with latest release"
    cmds:
      - ./scripts/update-homebrew-tap.sh

  version:
    desc: "Bump version, update all manifests, commit, tag, and push. Usage: task version BUMP=patch|minor|major"
    requires:
      vars: [BUMP]
    preconditions:
      - sh: '[ "{{.BUMP}}" = "patch" ] || [ "{{.BUMP}}" = "minor" ] || [ "{{.BUMP}}" = "major" ]'
        msg: "BUMP must be one of: patch, minor, major"
      - sh: "git diff --quiet && git diff --cached --quiet"
        msg: "Working tree must be clean before releasing"
    cmds:
      - |
        # Get current version from latest tag (strip leading v), default to 0.1.0
        TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
        if [ -z "$TAG" ]; then
          CURRENT="0.1.0"
        else
          CURRENT=$(echo "$TAG" | sed 's/^v//')
        fi
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        case "{{.BUMP}}" in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          patch) PATCH=$((PATCH + 1)) ;;
        esac

        NEW="${MAJOR}.${MINOR}.${PATCH}"
        echo "Bumping version: ${CURRENT} -> ${NEW}"

        # Update package.json
        sed -i '' "s/\"version\": \".*\"/\"version\": \"${NEW}\"/" package.json

        # Update tauri.conf.json
        sed -i '' "s/\"version\": \".*\"/\"version\": \"${NEW}\"/" src-tauri/tauri.conf.json

        # Update Cargo.toml files
        for f in src-tauri/Cargo.toml crates/redpen-cli/Cargo.toml crates/redpen-core/Cargo.toml; do
          sed -i '' "s/^version = \".*\"/version = \"${NEW}\"/" "$f"
        done

        # Generate changelog
        git cliff --latest --strip header -o CHANGELOG.md

        # Commit, tag, push
        git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml crates/redpen-cli/Cargo.toml crates/redpen-core/Cargo.toml CHANGELOG.md
        git commit -m "release: v${NEW}"
        git tag "v${NEW}"
        git push origin main
        git push origin "v${NEW}"

        echo "Released v${NEW}"
